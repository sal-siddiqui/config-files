# ~/.config/tmux/tmux.conf

# Render colors properly
set-option -g default-terminal "$TERM"
set-option -sg terminal-overrides ",*:RGB"

# Status bar
set-option -g status-style 'bg=default'
set-option -g status-left ''
set-option -g status-right '#[fg=blue]#S\
#{?client_prefix,#[fg=cyan] (Prefix Pressed),}\
#{?window_zoomed_flag,#[fg=cyan] (Zoomed),}'

# Windows
set-option -g window-status-format '#W'
set-option -g window-status-current-format '#W'
set-option -g window-status-separator ' #[fg=black,bright]ΓÇô '

set-option -g base-index '1'
set-option -g renumber-windows 'on'
set-option -g allow-rename 'off'
set-option -g  monitor-activity on

set-option -g window-status-style 'fg=black,bright,bg=default'
set-option -g window-status-current-style 'fg=blue,bg=default'
set-option -g window-status-bell-style 'fg=red,bg=default'
set-option -g window-status-activity-style 'fg=red,bg=default'

# Panes
set-option -g pane-border-style 'fg=black,bright,bg=default'
set-option -g pane-active-border-style 'fg=blue,bg=default'

# Extras
set-option -g menu-selected-style 'fg=blue,bg=black'
set-option -g menu-border-style 'fg=black,bright,bg=default'

set-option -g message-style 'fg=blue,bg=default'

set-option -g mode-keys 'vi'
set-option -g mode-style 'fg=default,bg=black'

# Keybindings
unbind-key C-b
set-option -g prefix C-Space

unbind r
bind-key r {
	source-file ~/.config/tmux/tmux.conf
	display "Reloaded tmux config"
}

bind-key '-n' 'C-Right' 'next-window'
bind-key '-n' 'C-Left' 'previous-window'

bind-key '-n' 'C-S-Right' 'swap-window -d -t +1'
bind-key '-n' 'C-S-Left' 'swap-window -d -t -1'
